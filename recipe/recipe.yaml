context:
  name: requirements-parser
  version: "0.13.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/requirements_parser-${{ version }}.tar.gz
  sha256: 78811383b2089b6c5197a1431bc2c12ff950245edca39a23eea3460782038dd3

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }},<4.0.0
    - packaging >=23.2
    - types-setuptools >=69.1.0

tests:
  - python:
      imports:
        - requirements
      python_version: ["${{ python_min }}.*"]
about:
  homepage: https://github.com/madpah/requirements-parser/
  documentation: https://requirements-parser.readthedocs.io/
  summary: A Pip requirements file parser.
  license: Apache-2.0
  license_file: LICENSE
  description: |
    This is a small Python module for parsing Pip requirement files.
    The goal is to parse everything in the Pip requirement file format spec.

extra:
  recipe-maintainers:
    - wolfv
    - sultaniman
